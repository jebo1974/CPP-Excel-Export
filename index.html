<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPP ექსპორტი</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a1a18;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 540px;
  }

  .logo {
    font-size: 13px;
    color: #888;
    margin-bottom: 1.5rem;
    letter-spacing: 0.02em;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #0f235f;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    height: 42px;
    padding: 0 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    color: #1a1a18;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: #0f235f;
    box-shadow: 0 0 0 3px rgba(15,35,95,0.08);
  }

  button.primary {
    height: 42px;
    padding: 0 20px;
    background: #0f235f;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }

  button.primary:hover { background: #1a3580; }
  button.primary:active { background: #0a1a45; }

  .error {
    display: none;
    margin-top: 8px;
    font-size: 13px;
    color: #c0392b;
  }

  .result {
    display: none;
    margin-top: 1.5rem;
  }

  .result-card {
    background: #f0f4ff;
    border: 1px solid #c5d0ef;
    border-radius: 12px;
    padding: 1rem 1.25rem;
  }

  .result-label {
    font-size: 12px;
    color: #6b7cb5;
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .result-url {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
    color: #0f235f;
    word-break: break-all;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .btn-row a { text-decoration: none; }

  button.secondary {
    height: 36px;
    padding: 0 16px;
    background: #fff;
    color: #0f235f;
    border: 1px solid #c5d0ef;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  button.secondary:hover { background: #e8edf8; }

  .footer {
    margin-top: 2rem;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    line-height: 1.6;
  }

  .footer a { color: #0f235f; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">cpp.procurement.gov.ge</div>
  <h1>CPP ცხრილის ექსპორტი</h1>
  <p class="subtitle">ჩააკოპირე ცხრილის ბმული და მიიღე Excel-ის ჩამოსატვირთი ლინკი</p>

  <label for="inp">ცხრილის ბმული</label>
  <div class="input-row">
    <input type="text" id="inp" placeholder="https://cpp.procurement.gov.ge/tables/..." oninput="clearError()" onkeydown="if(event.key==='Enter')generate()">
    <button class="primary" onclick="generate()">გენერირება</button>
  </div>
  <div class="error" id="err">არასწორი ბმული — cpp.procurement.gov.ge/tables/... უნდა იყოს</div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="result-label">ექსპორტის ბმული</div>
      <div class="result-url" id="out-url"></div>
      <div class="btn-row">
        <a id="dl-link" href="#" target="_blank">
          <button class="secondary">⬇ ჩამოტვირთვა</button>
        </a>
        <button class="secondary" onclick="copyUrl()" id="copy-btn">⎘ კოპირება</button>
      </div>
    </div>
  </div>

  <div class="footer">
    სამშენებლო ფასების პორტალის ღია მონაცემები ·
    <a href="https://cpp.procurement.gov.ge" target="_blank">cpp.procurement.gov.ge</a>
  </div>
</div>

<script>
function buildExportUrl(raw) {
  try {
    const url = new URL(raw.trim());
    if (!url.hostname.includes('cpp.procurement.gov.ge')) return null;
    const m = url.pathname.match(/\/tables\/([^\/\?#]+)/);
    if (!m) return null;
    return `https://cpp.procurement.gov.ge/tables/${m[1]}/export`;
  } catch { return null; }
}

function generate() {
  const raw = document.getElementById('inp').value;
  const exportUrl = buildExportUrl(raw);
  if (!exportUrl) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    return;
  }
  document.getElementById('err').style.display = 'none';
  document.getElementById('out-url').textContent = exportUrl;
  document.getElementById('dl-link').href = exportUrl;
  document.getElementById('result').style.display = 'block';
  document.getElementById('copy-btn').textContent = '⎘ კოპირება';
}

function clearError() {
  document.getElementById('err').style.display = 'none';
}

function copyUrl() {
  const url = document.getElementById('out-url').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ კოპირებულია!';
    setTimeout(() => btn.textContent = '⎘ კოპირება', 2000);
  });
}
</script>

</body>
</html>
